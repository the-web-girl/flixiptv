name: Build FlixIPTV

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate missing Android resources
        run: flutter create --platforms android . 2>/dev/null || true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Windows project files
        run: flutter create --platforms windows . 2>$null; exit 0
        shell: pwsh

      - name: Build Windows
        run: flutter build windows --release

      - name: Create ZIP archive
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath flixiptv-windows.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: flixiptv-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Android build
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: ./artifacts/android

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/android/app-release.apk
            artifacts/windows/flixiptv-windows.zip
          body: |
            ## 📺 FlixIPTV
            - 📱 **Android** : `app-release.apk`
            - 🖥️ **Windows** : `flixiptv-windows.zip`
            ### Playlist de test

            https://raw.githubusercontent.com/Rodri200906/IPTV-Rodri/main/IPTV-Rodri.m3u
            http://pro.reott8k.xyz:80/play/live.php?mac=00:1A:79:AE:A8:53&stream=413062&extension=ts&play_token=W8RGvvoeiV

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}