name: Build FlixIPTV

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flixiptv-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Enable Windows
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        run: |
          cd build/windows/x64/runner
          Compress-Archive -Path Release -DestinationPath flixiptv-windows.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: flixiptv-windows
          path: build/windows/x64/runner/flixiptv-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: flixiptv-android

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: flixiptv-windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            flixiptv-windows.zip
          body: |
            ## 📺 FlixIPTV

            ### Téléchargements
            - 📱 **Android** : `app-release.apk`
            - 🖥️ **Windows** : `flixiptv-windows.zip` (extraire et lancer `flixiptv.exe`)

            ### Playlist de test
            ```
            https://raw.githubusercontent.com/Rodri200906/IPTV-Rodri/main/IPTV-Rodri.m3u
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
