name: flixiptv
description: A beautiful IPTV player with M3U support
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Video playback - lib officielle Flutter, stable
  video_player: ^2.8.3
  chewie: ^1.7.4
  
  # HTTP & networking
  http: ^1.2.0
  
  # State management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # UI
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  
  # Utils
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true